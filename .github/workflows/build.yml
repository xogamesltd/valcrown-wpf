name: Build ValCrown
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore ValCrown/ValCrown.csproj

      - name: Publish
        run: dotnet publish ValCrown/ValCrown.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o publish/

      - name: Install NSIS
        run: choco install nsis -y

      - name: Write NSIS script
        shell: pwsh
        run: |
          $lines = @(
            '!define APPNAME "ValCrown"',
            'OutFile "ValCrown-Setup-1.0.0.exe"',
            'InstallDir "$PROGRAMFILES64\ValCrown"',
            'RequestExecutionLevel admin',
            'Name "ValCrown"',
            'Section',
            '  SetOutPath "$INSTDIR"',
            '  File "publish\ValCrown.exe"',
            '  CreateShortcut "$DESKTOP\ValCrown.lnk" "$INSTDIR\ValCrown.exe"',
            '  WriteUninstaller "$INSTDIR\Uninstall.exe"',
            '  WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\ValCrown" "DisplayName" "ValCrown"',
            '  WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\ValCrown" "Publisher" "XOGAMESLTD"',
            '  WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\ValCrown" "DisplayVersion" "1.0.0"',
            '  WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\ValCrown" "UninstallString" "$INSTDIR\Uninstall.exe"',
            'SectionEnd',
            'Section Uninstall',
            '  Delete "$INSTDIR\ValCrown.exe"',
            '  Delete "$INSTDIR\Uninstall.exe"',
            '  Delete "$DESKTOP\ValCrown.lnk"',
            '  RMDir "$INSTDIR"',
            '  DeleteRegKey HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\ValCrown"',
            'SectionEnd'
          )
          $lines | Set-Content setup.nsi

      - name: Build installer
        run: '& "C:\Program Files (x86)\NSIS\makensis.exe" setup.nsi'

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          name: ValCrown v1.0.0
          files: ValCrown-Setup-1.0.0.exe
          body: ValCrown v1.0.0 - XOGAMESLTD - Native C# Windows App
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
