name: Build ValCrown
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore ValCrown/ValCrown.csproj

      - name: Publish single exe
        run: >
          dotnet publish ValCrown/ValCrown.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish/

      - name: Install NSIS
        run: choco install nsis --yes --no-progress

      - name: Create NSIS script
        shell: pwsh
        run: |
          $lines = [System.Collections.Generic.List[string]]::new()
          $lines.Add('!define APPNAME "ValCrown"')
          $lines.Add('!define VERSION "1.0.0"')
          $lines.Add('!define PUBLISHER "XOGAMESLTD"')
          $lines.Add('OutFile "ValCrown-Setup-1.0.0.exe"')
          $lines.Add('InstallDir "$PROGRAMFILES64\ValCrown"')
          $lines.Add('RequestExecutionLevel admin')
          $lines.Add('Name "ValCrown"')
          $lines.Add('Page directory')
          $lines.Add('Page instfiles')
          $lines.Add('UninstPage instfiles')
          $lines.Add('Section "Install"')
          $lines.Add('  SetOutPath "$INSTDIR"')
          $lines.Add('  File "publish\ValCrown.exe"')
          $lines.Add('  CreateShortcut "$DESKTOP\ValCrown.lnk" "$INSTDIR\ValCrown.exe"')
          $lines.Add('  CreateDirectory "$SMPROGRAMS\ValCrown"')
          $lines.Add('  CreateShortcut "$SMPROGRAMS\ValCrown\ValCrown.lnk" "$INSTDIR\ValCrown.exe"')
          $lines.Add('  WriteUninstaller "$INSTDIR\Uninstall.exe"')
          $lines.Add('  WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\ValCrown" "DisplayName" "ValCrown"')
          $lines.Add('  WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\ValCrown" "Publisher" "XOGAMESLTD"')
          $lines.Add('  WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\ValCrown" "DisplayVersion" "1.0.0"')
          $lines.Add('  WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\ValCrown" "UninstallString" "$INSTDIR\Uninstall.exe"')
          $lines.Add('  WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\ValCrown" "URLInfoAbout" "https://valcrown.com"')
          $lines.Add('SectionEnd')
          $lines.Add('Section "Uninstall"')
          $lines.Add('  Delete "$INSTDIR\ValCrown.exe"')
          $lines.Add('  Delete "$INSTDIR\Uninstall.exe"')
          $lines.Add('  Delete "$DESKTOP\ValCrown.lnk"')
          $lines.Add('  Delete "$SMPROGRAMS\ValCrown\ValCrown.lnk"')
          $lines.Add('  RMDir "$SMPROGRAMS\ValCrown"')
          $lines.Add('  RMDir "$INSTDIR"')
          $lines.Add('  DeleteRegKey HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\ValCrown"')
          $lines.Add('SectionEnd')
          [System.IO.File]::WriteAllLines("setup.nsi", $lines)
          Write-Host "NSIS script written"
          Get-Content setup.nsi

      - name: Build MSI installer
        run: '& "C:\Program Files (x86)\NSIS\makensis.exe" setup.nsi'

      - name: Verify installer exists
        run: dir ValCrown-Setup-1.0.0.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          name: ValCrown v1.0.0
          draft: false
          prerelease: false
          files: ValCrown-Setup-1.0.0.exe
          body: |
            ValCrown v1.0.0 - Cloud Gaming Optimizer
            Publisher: XOGAMESLTD
            Built with C# WPF + WebView2

            Install:
            1. Download ValCrown-Setup-1.0.0.exe
            2. Run as Administrator
            3. Sign in at valcrown.com
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
